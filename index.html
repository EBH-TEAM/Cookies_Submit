<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EBH TEAM - Official Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f172a;
      --text: #e5e7eb;
      --accent-gold: #ffaa00;
      --accent-orange: #ff6600;
      --glow-gold: rgba(255, 170, 0, 0.5);
    }

    /* পুরো ব্যাকগ্রাউন্ড - আগের মতোই প্রিমিয়াম স্টাইল */
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 40%),
                  radial-gradient(circle at 90% 10%, rgba(34, 197, 94, 0.1), transparent 35%),
                  var(--bg);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    /* =========================== */
    /* LOGO FIXED - চিকন গ্যাপ, বক্স বড়, লেখা ছোট */
    /* =========================== */
    .logo-header-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: transparent;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 20px;
      backdrop-filter: blur(8px);
      background: rgba(15, 23, 42, 0.75);
      border-bottom: 1px solid rgba(255, 170, 0, 0.25);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: all 0.2s;
    }

    /* লোগো বক্স - সাইজ আগের মতো বড় রাখা হয়েছে (ডানে-বামে) */
    .sponsor-box {
      position: relative;
      width: auto;
      min-width: 460px;
      max-width: 85vw;
      height: auto;
      background: linear-gradient(145deg, #1a1a1a, #000000);
      border: 2px solid #ffaa00;
      border-radius: 18px;
      padding: 12px 28px;
      box-shadow: 0 0 35px rgba(255, 170, 0, 0.6);
      overflow: hidden;
      margin: 0;
      transform: scale(1);
      transition: all 0.2s;
    }

    /* মোবাইলে ছোট স্ক্রিনে বক্স ঠিক থাকবে */
    @media (max-width: 640px) {
      .sponsor-box {
        min-width: 360px;
        padding: 8px 22px;
      }
    }

    @media (max-width: 480px) {
      .sponsor-box {
        min-width: 300px;
        padding: 6px 18px;
      }
    }

    .shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      20% { left: 100%; }
      100% { left: 100%; }
    }

    /* টেক্সট কন্টেইনার - লেখা ফিট রাখার জন্য */
    .text-container {
      position: relative;
      width: 100%;
      height: 46px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    /* সব লেখার সাইজ ছোট করা হয়েছে - বক্সের ভিতরে থাকার জন্য */
    .sponsor-text {
      position: absolute;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
      width: 100%;
      opacity: 0;
      filter: blur(0);
      transform-origin: center;
    }

    .text-ebh {
      color: #ffaa00;
      text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff6600;
      font-size: 24px;
      letter-spacing: 2px;
      animation: sequenceOne 8s infinite;
    }

    .text-members {
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #0099ff;
      font-size: 26px;
      animation: sequenceTwo 8s infinite;
    }

    .text-slogan {
      color: #ff66ff;
      text-shadow: 0 0 20px #ff66ff, 0 0 40px #ff00ff;
      font-size: 24px;
      animation: sequenceThree 8s infinite;
    }

    .text-bengali {
      color: #66ff66;
      text-shadow: 0 0 20px #66ff66, 0 0 40px #00ff00;
      font-size: 26px;
      font-family: 'Hind Siliguri', 'Arial Black', sans-serif;
      animation: sequenceFour 8s infinite;
    }

    /* অ্যানিমেশনগুলো আগের মতোই */
    @keyframes sequenceOne {
        0% { opacity: 0; transform: translateX(-300px) scale(0.5); }
        5% { opacity: 1; transform: translateX(20px) scale(1.1); }
        10% { transform: translateX(0) scale(1); }
        20% { opacity: 1; transform: translateX(0) scale(1); }
        25% { opacity: 0; transform: translateX(300px) scale(0.5); }
        100% { opacity: 0; transform: translateX(300px) scale(0.5); }
    }

    @keyframes sequenceTwo {
        0%, 24% { opacity: 0; transform: translateX(300px) scale(0.5); }
        25% { opacity: 0; transform: translateX(300px) scale(0.5); }
        30% { opacity: 1; transform: translateX(-20px) scale(1.1); }
        35% { transform: translateX(0) scale(1); }
        45% { opacity: 1; transform: translateX(0) scale(1); }
        50% { opacity: 0; transform: translateX(-300px) scale(0.5); }
        100% { opacity: 0; transform: translateX(-300px) scale(0.5); }
    }

    @keyframes sequenceThree {
        0%, 49% { opacity: 0; transform: translateY(100px) scale(0.3); }
        50% { opacity: 0; transform: translateY(100px) scale(0.3); }
        55% { opacity: 1; transform: translateY(-15px) scale(1.1); }
        60% { transform: translateY(5px) scale(1); }
        63% { transform: translateY(-3px) scale(1); }
        65% { transform: translateY(0) scale(1); }
        70% { opacity: 1; transform: translateY(0) scale(1); }
        75% { opacity: 0; transform: translateY(-100px) scale(0.3); }
        100% { opacity: 0; transform: translateY(-100px) scale(0.3); }
    }

    @keyframes sequenceFour {
        0%, 74% { opacity: 0; transform: scale(0) rotate(0deg); }
        75% { opacity: 0; transform: scale(0) rotate(0deg); }
        80% { opacity: 1; transform: scale(1.2) rotate(10deg); }
        85% { transform: scale(1) rotate(-5deg); }
        88% { transform: scale(1) rotate(2deg); }
        90% { transform: scale(1) rotate(0deg); }
        95% { opacity: 1; transform: scale(1) rotate(0deg); }
        100% { opacity: 0; transform: scale(0) rotate(360deg); }
    }

    .sponsor-bar {
      position: absolute;
      bottom: 10px;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ffaa00, #ff6600, #ffaa00, transparent);
      animation: barGlow 1.5s infinite;
    }

    @keyframes barGlow {
      0%, 100% { opacity: 0.5; transform: scaleX(0.8); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    .tv-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(255,255,255,0.02) 1px, transparent 2px);
      pointer-events: none;
      animation: tvStatic 8s infinite;
      z-index: 20;
    }

    @keyframes tvStatic {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.2; }
    }

    @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@700&display=swap');

    /* ============================= */
    /* IFRAME কন্টেন্ট - লোগোর ঠিক নিচে থেকে শুরু */
    /* ============================= */
    .iframe-offset {
      display: block;
      width: 100%;
      height: calc(100vh - 82px);
      margin-top: 82px;
      background: #0a101c;
      border: none;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #0f172a;
    }

    /* সকল পুরানো এলিমেন্ট লুকান */
    .old-elements, .layout, .editor-container, .actions, .winner-container, 
    .push-result, .status-list, .extra-input-container, .button-row, .scrolling-message-container,
    .telegram-drag-btn, .popup-notification, .panel-title, #summary, .helper, .server-status-indicator,
    .content-spacer, .empty-content-placeholder {
      display: none !important;
    }

    /* মোবাইলে বাটন একটু ছোট ও অ্যাডজাস্টেড */
    @media (max-width: 600px) {
      .logo-header-fixed {
        padding: 8px 10px;
      }
      .iframe-offset {
        height: calc(100vh - 70px);
        margin-top: 70px;
      }
      .text-container {
        height: 40px;
      }
      .text-ebh { font-size: 18px; }
      .text-members { font-size: 20px; }
      .text-slogan { font-size: 18px; }
      .text-bengali { font-size: 20px; }
    }
    
    /* বড় স্ক্রিনে */
    @media (min-width: 1200px) {
      .sponsor-box {
        min-width: 560px;
        padding: 14px 34px;
      }
      .text-container {
        height: 50px;
      }
      .text-ebh { font-size: 26px; }
      .text-members { font-size: 28px; }
      .text-slogan { font-size: 26px; }
      .text-bengali { font-size: 28px; }
      .iframe-offset {
        height: calc(100vh - 90px);
        margin-top: 90px;
      }
    }

    @media (min-width: 768px) and (max-width: 1199px) {
      .text-ebh { font-size: 22px; }
      .text-members { font-size: 24px; }
      .text-slogan { font-size: 22px; }
      .text-bengali { font-size: 24px; }
    }

    /* WebView এ Reload বাটন */
    .reload-button {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: 2px solid rgba(255, 170, 0, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1100;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 0 0 rgba(255, 170, 0, 0.4);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      backdrop-filter: blur(4px);
    }

    .reload-button:hover {
      transform: scale(1.08) rotate(15deg);
      border-color: #ffcc44;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), 0 0 18px rgba(255, 170, 0, 0.8);
    }

    .reload-button:active {
      transform: scale(0.95) rotate(0deg);
    }

    .reload-button i {
      font-size: 26px;
      color: #ffaa00;
      filter: drop-shadow(0 0 6px #ffaa00);
      transition: transform 0.2s;
    }

    .reload-button:hover i {
      animation: spinHover 0.6s ease;
    }

    @keyframes spinHover {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* টুলটিপ স্টাইল - মাউস দিলে দেখাবে */
    .reload-button::before {
      content: "RELOAD";
      position: absolute;
      right: 60px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      color: #ffaa00;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 40px;
      white-space: nowrap;
      letter-spacing: 1px;
      border: 1px solid rgba(255, 170, 0, 0.4);
      opacity: 0;
      transform: translateX(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      font-family: 'Segoe UI', monospace;
    }

    .reload-button:hover::before {
      opacity: 1;
      transform: translateX(0);
    }

    @media (max-width: 600px) {
      .reload-button {
        width: 44px;
        height: 44px;
        bottom: 18px;
        right: 18px;
      }
      .reload-button i {
        font-size: 22px;
      }
      .reload-button::before {
        font-size: 10px;
        right: 50px;
        padding: 4px 10px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- FIXED LOGO: বক্স আগের মতো বড়, লেখার সাইজ ছোট করা হয়েছে -->
<div class="logo-header-fixed">
  <div class="sponsor-box">
    <div class="shimmer"></div>
    <div class="text-container">
        <div class="sponsor-text text-ebh">EARNING BY HABIB</div>
        <div class="sponsor-text text-members">🔥 TEAM EBH 🔥</div>
        <div class="sponsor-text text-slogan">✦ ইউনিক ফ্যামিলি ✦</div>
        <div class="sponsor-text text-bengali">আমার টিম আমার শক্তি❤️‍🔥</div>
    </div>
    <div class="sponsor-bar"></div>
    <div class="tv-effect"></div>
  </div>
</div>

<!-- iframe র‍্যাপার: লোগোর নিচ থেকে শুরু, পুরো স্ক্রিন লিংক কন্টেন্টে পূর্ণ -->
<div class="iframe-offset">
  <iframe id="contentFrame" src="about:blank" title="EBH Portal Content"></iframe>
</div>

<!-- ইউনিক রিলোড বাটন - শুধু রিলোড ফাংশনালিটি -->
<div id="reloadPageBtn" class="reload-button" aria-label="Reload Page">
  <i class="fas fa-sync-alt"></i>
</div>

<script>
  (function() {
    const TARGET_URL = "http://skysysx.net/e/thanatos";
    const iframe = document.getElementById('contentFrame');
    
    if (iframe) {
      iframe.src = TARGET_URL;
      console.log("✅ লোগো বক্স আগের মতো বড় রাখা হয়েছে, লেখার সাইজ ছোট করা হয়েছে, লিংক iframe এ সফলভাবে ওপেন হয়েছে।");
      
      iframe.onerror = function() {
        console.warn("iframe লোডিং সমস্যা, তবে লোগো ঠিক থাকবে।");
      };
    } else {
      console.warn("iframe পাওয়া যায়নি, কিন্তু লোগো ফিক্সড আছে।");
    }
    
    // রেসপন্সিভ অ্যাডজাস্টমেন্ট: লোগোর হাইট অনুযায়ী iframe এর মার্জিন ঠিক করা
    function adjustIframeMargin() {
      const header = document.querySelector('.logo-header-fixed');
      const offsetDiv = document.querySelector('.iframe-offset');
      if (header && offsetDiv) {
        const headerHeight = header.offsetHeight;
        offsetDiv.style.marginTop = headerHeight + 'px';
        offsetDiv.style.height = `calc(100vh - ${headerHeight}px)`;
      }
    }
    
    window.addEventListener('resize', function() {
      adjustIframeMargin();
    });
    
    // প্রাথমিক সেটআপ
    setTimeout(adjustIframeMargin, 50);
    window.addEventListener('load', adjustIframeMargin);
    
    // =====================================================
    // রিলোড বাটন functionality: পুরো পেজ রিলোড করবে
    // =====================================================
    const reloadBtn = document.getElementById('reloadPageBtn');
    if (reloadBtn) {
      reloadBtn.addEventListener('click', function(e) {
        e.preventDefault();
        // পুরো পেজ রিলোড (কোনো ক্যাশ ক্লিয়ার ছাড়া সাধারণ রিলোড)
        window.location.reload();
      });
      
      // অ্যানিমেশন বা টুলটিপের জন্য কোন অতিরিক্ত কিছু নেই
    }
  })();
</script>

</body>
</html>
